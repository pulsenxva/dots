#MONITORS
monitor = eDP-1, 1920x1200, -1920x0, 1
monitor = HDMI-A-1, 2560x1440, 0x0, 1
#MY PROGRAMS
$terminal = alacritty
$fileManager = nautilus
$menu = wofi --show drun
$browser = firefox
$bar = waybar
$calculator = gnome-calculator --mode=keyboard
$network = nekoray
#AUTOSTART
# for vscode
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets,pkcs11,ssh
exec-once = export $(gnome-keyring-daemon --start --components=secrets)

exec-once = swayosd-server
#exec-once = hyprpaper
exec-once = swaybg -i /home/jonathan/wp/pixel-street.png -m fill
exec-once = dunst & waybar
exec-once = /lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-clipboard-history -t
exec-once = wl-paste --watch cliphist store
exec-once = wl-clip-persist --clipboard regular --display wayland-1
#ENVIRONMENT VARIABLES
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24
#LOOK AND FEEL

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

general {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more

  gaps_in = 4       
  gaps_out = 7, 8, 8, 8        
  #gaps_out = 0
  #gaps_in = 0
  border_size = 0
  col.active_border = 0xffcba6f7
  #col.inactive_border = 0xff313244
  layout = dwindle
}

decoration {
  # See https://wiki.hyprland.org/Configuring/Variables/ for more

  #rounding = 7
  rounding = 0
  active_opacity = 1.0
  inactive_opacity = 1.0
  blur {
    enabled = yes
    size = 10
    passes = 1
    new_optimizations = on
  }
  shadow {
    enabled=false
    ignore_window = true
    range = 4
    offset = 2 2
    render_power = 2
    color = 0x66000000
  }
}
animations {
  enabled = true
  
  bezier = myBezier, 0.05, 0.9, 0.1, 1.05
  bezier = fastBezier, 0.2, 0.9, 0.4, 1.0  
  
  animation = windows, 1, 4, myBezier      
  animation = windowsOut, 1, 4, default, popin 80% 
  animation = border, 1, 5, default      
  animation = borderangle, 1, 5, default  
  animation = fade, 1, 4, default
  animation = workspaces, 1, 4, default    
}
dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
  pseudotile = true # master switch for pseudotiling. Enabling is boun>
  preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
  new_status = master
  new_on_top = true
}
# dracula/hyprland
general {
  col.active_border = rgb(268bd2) # rgb(6272a4) # or rgb(44475a)
  col.inactive_border = rgb(1a1a1a)
}


gesture = 3, horizontal, workspace
gestures {
  workspace_swipe_forever=true
  workspace_swipe_invert=true
}

#INPUT
input {
  kb_layout = us,ru
  kb_variant =
  kb_model =
  kb_options = grp:alt_shift_toggle
  kb_rules =
  follow_mouse = 1
  sensitivity = -1.0
  touchpad {
    natural_scroll = true
    scroll_factor = 0.4
  }
}
device {
  name = elan2611:00-04f3:31dc-touchpad
  sensitivity = 0
}

#KEYBINDINGS
$mainMod = SUPER
bind = $mainMod, C, killactive,
bind = $mainMod, Y, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, O, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen,
bind = $mainMod, T, exec, Telegram
bind = $mainMod, D, exec, emacs
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, R, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, exec, pkill $bar || $bar
bind = $mainMod, K, exec, $calculator
bind = $mainMod, M, exec, blueman-manager
bind = $mainMod, P, exec, code
bind = $mainMod SHIFT, S, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = $mainMod, N, exec, $network
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = ALT, left, movewindow, l
bind = ALT, right, movewindow, r
bind = ALT, up, movewindow, u
bind = ALT, down, movewindow, d
#bind = ALT, left, swapwindow, l
#bind = ALT, right, swapwindow, r
#bind = ALT, up, swapwindow, u
#bind = ALT, down, swapwindow, d
binde = CTRL, up, resizeactive, 0 -20
binde = CTRL, down, resizeactive, 0 20
binde = SUPER, bracketleft, resizeactive, -20 0
binde = SUPER, bracketright, resizeactive, 20 0
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod shift, 1, movetoworkspace, 1
bind = $mainMod shift, 2, movetoworkspace, 2
bind = $mainMod shift, 3, movetoworkspace, 3
bind = $mainMod shift, 4, movetoworkspace, 4
bind = $mainMod shift, 5, movetoworkspace, 5
bind = $mainMod shift, 6, movetoworkspace, 6
bind = $mainMod shift, 7, movetoworkspace, 7
bind = $mainMod shift, 8, movetoworkspace, 8
bind = $mainMod shift, 9, movetoworkspace, 9
bind = $mainMod shift, 0, movetoworkspace, 10
bind = $mainMod, A, togglespecialworkspace, magic
bind = $mainMod shift, A, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# sudo pacman -S swayosd
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

binde = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
binde = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

